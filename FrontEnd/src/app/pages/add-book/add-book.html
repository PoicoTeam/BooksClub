<div class="min-h-screen bg-orange-50/30 dark:bg-gray-950 p-6 flex justify-center items-center">
  <div class="w-full max-w-lg bg-white dark:bg-gray-900 border border-orange-100 dark:border-gray-800 rounded-2xl shadow-xl p-8">
    <h2 class="text-2xl font-bold mb-6 text-orange-600 dark:text-indigo-400">Aggiungi un nuovo libro</h2>
    
    <form [formGroup]="bookForm" (ngSubmit)="saveBook()" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold mb-1">Titolo</label>
        <input formControlName="titolo" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-700 bg-transparent outline-none focus:ring-2 focus:ring-orange-500" />
      </div>
      
      <div>
        <label class="block text-sm font-semibold mb-1">Autore</label>
        <input formControlName="autore" class="w-full px-4 py-2 rounded-xl border border-gray-300 dark:border-gray-700 bg-transparent outline-none focus:ring-2 focus:ring-orange-500" />
      </div>

      <div class="flex gap-4 mt-6">
        <button type="button" routerLink="/dashboard" class="flex-1 py-2 rounded-xl border border-gray-300 dark:border-gray-700 hover:bg-gray-100 dark:hover:bg-gray-800">Annulla</button>
        <button type="submit" [disabled]="bookForm.invalid" class="flex-1 py-2 rounded-xl bg-orange-600 hover:bg-orange-700 text-white shadow-lg disabled:opacity-50">Salva Libro</button>
      </div>
    </form>
  </div>
</div>
