<div class="max-w-2xl mx-auto p-4 sm:p-6">
  <div class="w-full bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border border-orange-100/80 dark:border-gray-800 rounded-3xl shadow-2xl p-6 sm:p-10 transition-all duration-300 hover-lift book-card-enter">
    
    <div class="flex items-center gap-4 mb-8">
      <div class="p-3 bg-orange-500/10 dark:bg-indigo-500/10 rounded-2xl text-2xl text-orange-600 dark:text-indigo-400">
        ✨
      </div>
      <div>
        <h2 class="text-2xl sm:text-3xl font-black tracking-tight text-gray-900 dark:text-white">
          Aggiungi un <span class="text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-amber-500 dark:from-indigo-400 dark:to-purple-400">Nuovo Libro</span>
        </h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Arricchisci la tua libreria personale compilando i dettagli qui sotto.</p>
      </div>
    </div>
    
    <form [formGroup]="bookForm" (ngSubmit)="saveBook()" class="space-y-5">
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Titolo del Libro *</label>
          <div class="relative">
            <span class="absolute left-4 top-3 text-gray-400 text-sm">📖</span>
            <input formControlName="titolo" placeholder="Es. Il Signore degli Anelli" 
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 font-medium text-gray-900 dark:text-gray-100" />
          </div>
        </div>
        
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Autore *</label>
          <div class="relative">
            <span class="absolute left-4 top-3 text-gray-400 text-sm">✍️</span>
            <input formControlName="autore" placeholder="Es. J.R.R. Tolkien" 
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 font-medium text-gray-900 dark:text-gray-100" />
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Genere</label>
          <input formControlName="genere" placeholder="Es. Fantasy, Sci-Fi" 
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 text-gray-900 dark:text-gray-100" />
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Editore</label>
          <input formControlName="editore" placeholder="Es. Mondadori" 
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 text-gray-900 dark:text-gray-100" />
        </div>
        
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Anno Pubblicazione</label>
          <input type="number" formControlName="anno" placeholder="Es. 1954" 
            class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 text-gray-900 dark:text-gray-100" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Codice ISBN</label>
          <div class="relative">
            <span class="absolute left-4 top-3 text-gray-400 text-xs font-bold tracking-tight">№</span>
            <input formControlName="isbn" placeholder="Es. 9788845292613" 
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 text-gray-900 dark:text-gray-100" />
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Valutazione Personale</label>
          <div class="relative">
            <span class="absolute left-4 top-3 text-gray-400 text-sm">⭐</span>
            <input type="number" min="1" max="5" formControlName="voto" placeholder="Scegli un voto da 1 a 5" 
              class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 text-gray-900 dark:text-gray-100" />
          </div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Stato lettura</label>
        <select formControlName="stato"
          class="w-full px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm dark:text-white">
          <option value="da_leggere">Da leggere</option>
          <option value="in_lettura">In lettura</option>
          <option value="letto">Letto</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">URL Immagine di Copertina</label>
        <div class="relative">
          <span class="absolute left-4 top-3 text-gray-400 text-sm">🖼️</span>
          <input formControlName="copertina" placeholder="Es. https://esempio.com/copertina.jpg" 
            class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 text-gray-900 dark:text-gray-100" />
        </div>
        <p
          *ngIf="bookForm.get('copertina')?.touched && bookForm.get('copertina')?.hasError('invalidUrl')"
          class="text-xs text-amber-600 dark:text-amber-400 mt-1"
        >
          URL non valido. Usa un link che inizia con http:// o https://, oppure lascia il campo vuoto per il placeholder.
        </p>
      </div>

      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-1.5">Descrizione o Recensione</label>
        <textarea formControlName="descrizione" rows="4" placeholder="Lascia i tuoi pensieri sul libro o incolla la trama..." 
          class="w-full px-4 py-3 rounded-2xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 text-sm outline-none transition-all duration-200 focus:border-orange-500 dark:focus:border-indigo-500 focus:bg-white dark:focus:bg-gray-900 focus:ring-4 focus:ring-orange-500/10 dark:focus:ring-indigo-500/10 resize-none text-gray-900 dark:text-gray-100"></textarea>
      </div>

      <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-gray-100 dark:border-gray-800/60">
        <button type="button" routerLink="/dashboard" 
          class="order-2 sm:order-1 flex-1 py-3 text-sm font-semibold rounded-xl border border-gray-200 dark:border-gray-800 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800 transition-all active:scale-[0.98] cursor-pointer text-center">
          Annulla
        </button>
        
        <button type="submit" [disabled]="bookForm.invalid || saving" 
          class="order-1 sm:order-2 flex-1 py-3 text-sm font-bold rounded-xl text-white bg-gradient-to-r from-orange-600 to-amber-500 hover:from-orange-700 hover:to-amber-600 dark:from-indigo-600 dark:to-purple-600 dark:hover:from-indigo-700 dark:hover:to-purple-700 shadow-lg shadow-orange-500/20 dark:shadow-none disabled:opacity-40 disabled:pointer-events-none hover:scale-[1.01] active:scale-[0.98] transition-all cursor-pointer text-center">
          {{ saving ? 'Salvataggio...' : 'Salva nel Club' }}
        </button>
      </div>
    </form>
  </div>
</div>
