<div class="max-w-2xl mx-auto p-4 sm:p-6">
  <div class="w-full bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border border-orange-100/80 dark:border-gray-800 rounded-3xl shadow-2xl p-6 sm:p-10 book-card-enter hover-lift">
    <h2 class="text-2xl font-black text-gray-900 dark:text-white mb-6">Modifica libro</h2>

    <p *ngIf="loading" class="text-sm text-gray-500">Caricamento...</p>

    <form *ngIf="!loading" [formGroup]="bookForm" (ngSubmit)="saveChanges()" class="space-y-4">
      <input formControlName="titolo" placeholder="Titolo *"
        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
      <input formControlName="autore" placeholder="Autore *"
        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
      <div class="grid grid-cols-2 gap-3">
        <input type="number" formControlName="anno" placeholder="Anno"
          class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
        <input formControlName="genere" placeholder="Genere"
          class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
      </div>
      <input formControlName="editore" placeholder="Editore"
        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
      <input formControlName="isbn" placeholder="ISBN"
        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
      <input type="number" min="1" max="5" formControlName="voto" placeholder="Voto (1-5)"
        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
      <input formControlName="copertina" placeholder="URL copertina (http/https)"
        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white" />
      <p
        *ngIf="bookForm.get('copertina')?.touched && bookForm.get('copertina')?.hasError('invalidUrl')"
        class="text-xs text-amber-600 dark:text-amber-400 -mt-2"
      >
        URL copertina non valido.
      </p>
      <textarea formControlName="descrizione" rows="4" placeholder="Descrizione"
        class="w-full p-3 rounded-xl border border-gray-200 dark:border-gray-800 bg-gray-50/50 dark:bg-gray-950/50 dark:text-white resize-none"></textarea>

      <div class="flex gap-3 pt-2">
        <button type="button" [routerLink]="['/book-details', bookId]"
          class="flex-1 py-3 rounded-xl border border-gray-200 dark:border-gray-800 font-semibold dark:text-gray-200">
          Annulla
        </button>
        <button type="submit" [disabled]="saving"
          class="flex-1 py-3 rounded-xl bg-orange-600 dark:bg-indigo-600 text-white font-bold disabled:opacity-50">
          {{ saving ? 'Salvataggio...' : 'Salva modifiche' }}
        </button>
      </div>
    </form>
  </div>
</div>
