<div class="min-h-screen flex flex-col justify-center items-center bg-orange-50/50 dark:bg-gray-950 p-4 transition-colors duration-300">
  
  <div class="absolute top-4 right-4">
    <button (click)="toggleTheme()" type="button" class="px-4 py-2 text-sm font-medium rounded-full bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-200 border border-orange-200 dark:border-gray-800 shadow-sm hover:bg-orange-50 dark:hover:bg-gray-800 transition-all cursor-pointer">
      <span *ngIf="isDark$ | async">☀️ Tema Chiaro</span>
      <span *ngIf="!(isDark$ | async)">🌙 Tema Scuro</span>
    </button>
  </div>

  <div class="w-full max-w-md bg-white dark:bg-gray-900 border border-orange-100 dark:border-gray-800 rounded-2xl shadow-xl p-8 transition-colors duration-300">
    
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-orange-600 dark:text-indigo-400">BooksClub</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Accedi per entrare nel tuo club del libro</p>
    </div>

    <div *ngIf="errorMessage" class="mb-4 p-3 text-sm text-red-700 bg-red-100 dark:bg-red-900/30 dark:text-red-400 rounded-lg border border-red-200 dark:border-red-800">
      ⚠️ {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Username</label>
        <input 
          type="text" 
          formControlName="username"
          placeholder="Il tuo username"
          class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-700 bg-transparent text-gray-900 dark:text-white focus:ring-2 focus:ring-orange-500 dark:focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder-gray-400 dark:placeholder-gray-500"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Password</label>
        <input 
          type="password" 
          formControlName="password"
          placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-700 bg-transparent text-gray-900 dark:text-white focus:ring-2 focus:ring-orange-500 dark:focus:ring-indigo-500 focus:border-transparent outline-none transition-all placeholder-gray-400 dark:placeholder-gray-500"
        />
      </div>

      <button 
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full py-3 px-4 font-semibold text-white bg-orange-600 hover:bg-orange-700 dark:bg-indigo-600 dark:hover:bg-indigo-700 disabled:bg-gray-200 dark:disabled:bg-gray-800 disabled:text-gray-400 rounded-xl shadow-lg hover:shadow-orange-500/20 dark:hover:shadow-indigo-500/20 transition-all cursor-pointer disabled:cursor-not-allowed"
      >
        Accedi
      </button>

    </form>

    <div class="text-center mt-6">
      <p class="text-sm text-gray-600 dark:text-gray-400">
        Non hai ancora un account? 
        <a routerLink="/register" class="font-bold text-orange-600 dark:text-indigo-400 hover:underline">Registrati ora</a>
      </p>
    </div>

  </div>
</div>
