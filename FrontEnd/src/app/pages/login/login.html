<div
  class="w-full bg-white dark:bg-gray-900 border border-orange-100 dark:border-gray-800 rounded-2xl shadow-xl p-8 transition-all duration-300 hover-lift"
>
  <div class="text-center mb-8">
    <h1 class="text-3xl font-extrabold text-orange-600 dark:text-indigo-400">Bentornato</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-2">Accedi per entrare nel tuo club del libro</p>
  </div>

  <div
    *ngIf="errorMessage"
    class="mb-4 p-3 text-sm text-red-700 bg-red-100 dark:bg-red-900/30 dark:text-red-400 rounded-lg border border-red-200 dark:border-red-800"
  >
    {{ errorMessage }}
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Username</label>
      <input
        type="text"
        formControlName="username"
        placeholder="Il tuo username"
        class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-700 bg-transparent text-gray-900 dark:text-white focus:ring-2 focus:ring-orange-500 dark:focus:ring-indigo-500 outline-none transition-all"
      />
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Password</label>
      <input
        type="password"
        formControlName="password"
        placeholder="••••••••"
        class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-700 bg-transparent text-gray-900 dark:text-white focus:ring-2 focus:ring-orange-500 dark:focus:ring-indigo-500 outline-none transition-all"
      />
    </div>

    <button
      type="submit"
      [disabled]="loginForm.invalid"
      class="w-full py-3 font-semibold text-white bg-orange-600 hover:bg-orange-700 dark:bg-indigo-600 dark:hover:bg-indigo-700 disabled:opacity-40 rounded-xl shadow-lg transition-all active:scale-[0.98]"
    >
      Accedi
    </button>
  </form>

  <p class="text-center mt-6 text-sm text-gray-600 dark:text-gray-400">
    Non hai un account?
    <a routerLink="/register" class="font-bold text-orange-600 dark:text-indigo-400 hover:underline"
      >Registrati</a
    >
  </p>
</div>
